name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - "**"  # Build on all branches (including main)
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".github/workflows/**"
      - "catalog-info.yaml"
      - "mkdocs.yml"

permissions:
  contents: read
  packages: write

jobs:
  build:
    uses: ./.github/workflows/reusable-build-deploy.yaml
    permissions:
      contents: read
      packages: write
    secrets: inherit  # Pass secrets to reusable workflow
